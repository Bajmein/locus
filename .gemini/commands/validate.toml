description = "Validate a pipeline artifact against its YAML schema."

prompt = """
Validate a pipeline artifact against its YAML schema.

Usage: `/validate <NNN-slug> [proposal|spec|design|tasks]`

This command does NOT modify any files. It reads an artifact and validates it against
the rules in the corresponding schema in `.engine/schemas/`.

## Before You Begin

1. Parse `{{args}}`:
   - First token: change slug (`NNN-slug`) only.
   - Second token (optional): artifact type — one of `proposal`, `spec`, `design`, `tasks`.
      If omitted, validate all four artifacts that exist for the change.
2. Resolve the change directory: `.engine/changes/<slug>/`.
3. Read the relevant schema(s) from `.engine/schemas/`:
   - `proposal.yaml` for `proposal.md`
   - `spec.yaml` for `specs/**/*.md`
   - `design.yaml` for `design.md`
   - `tasks.yaml` for `tasks.md`

## Execute

For each artifact:

0. **Folder pattern**: read `generates.folder_pattern` from schema and ensure `<NNN-slug>`
   matches it. If not, emit FAIL for folder name mismatch.

1. **Frontmatter**: parse YAML between `---` delimiters. Check required fields, types, enum values.
2. **Sections**: verify all required H2 headings from schema `sections` are present in body.
3. **H1 title**: for `proposal.md` and `design.md`, assert at least one `# ` heading in body.
4. **Capability names** (proposals): each name under `## Capabilities` must match `^[a-z0-9]+(-[a-z0-9]+)*$`.
5. **Tag format** (proposals): each tag must match `^[a-z0-9-]+:[a-z0-9-]+$`.
6. **Tasks completeness** (tasks.md): assert at least one `- [x]` or `- [ ]` line.

## Emit Report

```
## Validation Report: <NNN-slug> / <type>

Schema: .engine/schemas/<type>.yaml

### Frontmatter
✓ type: proposal
✗ Missing required field: priority

### Sections
✓ ## Why
✗ Missing required section: ## Impact

### Format
✓ H1 title present
✗ Capability name not kebab-case: 'MyCapability'

---
Result: FAIL  (3 errors found)
```

No files are created or modified.
"""
