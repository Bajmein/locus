description = "Draft a proposal artifact for a new change, executing the propose phase natively."

prompt = """
Draft a proposal for a new change in the Locus pipeline.

Usage: `/propose <idea-description or NNN-slug>`

You are a software architect executing the **propose** phase of Spec-Driven Development.

## Before You Begin

1. Parse `{{args}}`. If it looks like a change slug (`NNN-slug`), check `.engine/changes/{{args}}/` for an existing `proposal.md`. If it's free-text, you will create a new change directory.
2. Determine the next sequential change number: list `.engine/changes/` → find the highest NNN, increment by 1.
3. Check `.engine/ideas/` for any matching idea file. Read it if found.
4. Read `.engine/CAMPAIGN.md` or `.engine/changes/roadmap.md` for strategic context if they exist.
5. Read `.engine/specs/` to understand the current accumulated spec for the relevant domain.
6. Explore the codebase using rg, glob patterns, ast-grep for the idea's domain.

## Execute

1. Determine the change directory: `.engine/changes/<NNN>-<slug>/` (slug = kebab-case summary).
2. Write `.engine/changes/<NNN>-<slug>/proposal.md`:

Frontmatter (required):
```yaml
---
type: proposal
domain: <area of the system>
status: proposed
priority: <low|medium|high>
author: <your model ID>
created_at: <YYYY-MM-DD>
model: <human-readable model name>
tags:
  - area:<domain>
  - feature:<kebab-case-feature-name>
  - path:<affected/file.py>
---
```

Required sections (H2):
- `## Why` — motivation and problem statement
- `## What Changes` — high-level behavioral and structural changes
- `## Capabilities` — bulleted list; each name in **kebab-case** with one-line description
- `## Impact` — affected modules, risks, dependencies, breaking changes

3. Report: change directory, proposal path, key capabilities proposed.

## Tools

- **Search**: rg, glob patterns, ast-grep for structural patterns
- **Read**: source files, idea files, existing proposals, accumulated specs
- **Write**: create proposal.md
- **CLI (read-only)**: eza, git log, rg via Bash
"""
