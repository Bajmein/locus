description = "Activa Serena MCP ejecutando sus instrucciones iniciales."

prompt = """
Activa Serena MCP ejecutando sus instrucciones iniciales.

Usage: `/serena-init`

Ejecuta las instrucciones iniciales de Serena MCP para el proyecto activo.

## Pasos

1. Llama a `mcp__serena__initial_instructions` para cargar el manual de Serena.

2. Reporta al usuario:
   - Proyecto activado (nombre y ruta)
   - Lenguaje(s) de programación detectados
   - Memorias del proyecto disponibles
   - Modos activos (editing / interactive / planning)

3. Confirma que Serena está lista con un mensaje conciso.

## Notas

- Este comando no modifica archivos ni crea artefactos.
- Útil al inicio de una sesión para asegurar que el contexto semántico de Serena está cargado.
- Si recibes error "no active project", el proyecto se activa automáticamente al llamar `initial_instructions`.
"""
