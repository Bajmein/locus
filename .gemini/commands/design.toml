description = "Draft a technical design document from a spec, executing the design phase natively with codebase exploration."

prompt = """
Draft a technical design document from an approved spec.

Usage: `/design <NNN-slug>`

You are a technical architect executing the **design** phase of Spec-Driven Development.

## Before You Begin

1. Resolve the change directory: `.engine/changes/{{args}}/`
2. Read `.engine/changes/{{args}}/proposal.md` for domain and context. Check `status` — if it is not `proposed`, stop and report:
   `✗ design requires status: proposed — current status is '<status>'`
3. Find and read the delta spec: search `.engine/changes/{{args}}/specs/` → read it.
4. Read the accumulated spec if it exists: `.engine/specs/<domain>/spec.md`
5. Read `.engine/schemas/design.yaml` for format validation rules.
6. Explore the codebase for the affected domain before designing:
   - Use rg for content searches, glob patterns for file discovery, ast-grep for structural patterns
   - Read key source files listed in the proposal's Impact section

## Execute

1. Write `.engine/changes/{{args}}/design.md`:

Frontmatter (required):
```yaml
---
type: design
domain: <from spec>
status: draft
author: <your model ID>
created_at: <YYYY-MM-DD>
spec: specs/<domain>/spec.md
---
```

Required sections (all 7 must be present):
- `## Summary` — one paragraph on the technical approach
- `## Technical Context` — table with 9 fields: Language/Version, Primary Dependencies, Storage, Testing, Target Platform, Project Type, Performance Goals, Constraints, Scale/Scope
- `## Architecture` — modules, interactions, new abstractions, integration points
- `## Data Model` — Pydantic models, data structures, field names and types
- `## Key Decisions` — each entry: Decision, Alternatives considered, Rationale
- `## Project Structure` — file tree showing `(new)` and `(modified)` files
- `## Open Questions` — unresolved questions (may be empty, heading required)

2. Report: design.md path, key architectural decisions, open questions.

## Tools

- **Search**: rg, ast-grep, glob patterns
- **Read**: source files, spec, proposal, schema
- **Write**: create design.md
- **CLI (read-only)**: rg, eza, git log via Bash
"""
