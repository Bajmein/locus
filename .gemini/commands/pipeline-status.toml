description = "Show the current status of all active changes in the pipeline."

prompt = """
Show the current status of all active changes in the pipeline.

Usage: `/pipeline-status`

This command does NOT modify any files. It reads and reports the state of all active changes.

## Execute

1. List all directories under `.engine/changes/` that are NOT `archive/`:
   ```bash
   ls .engine/changes/
   ```

2. For each directory (excluding `archive/` and hidden files):
   - Read `proposal.md` and extract: `status`, `domain`, `priority`, `github_issue`, H1 title.
   - Check which artifacts exist: `specs/` (any `.md`), `design.md`, `tasks.md`.
   - If `tasks.md` exists, count `- [x]` vs total task lines.

3. Emit a status table grouped by `status`, ordered by priority (high → medium → low):

```
## Pipeline Status — <date>

### 🟡 proposed  (N changes)
| Slug | Domain | Priority | Issue | Artifacts | Tasks |
|------|--------|----------|-------|-----------|-------|
| NNN-slug | domain | high | #N | proposal ✓ spec ✓ design ✗ tasks ✗ | — |

### 🟢 approved  (N changes)
...

### 📋 Summary
- Total active changes: N
- Blocked (approved but missing tasks.md): N
- Ready to apply (approved + tasks.md present): N
```

4. Flag blocked changes:
   - `approved` + missing `tasks.md` → blocked, cannot `/apply`.
   - `proposed` + missing `design.md` → stalled before `break-to-tasks`.
   - Missing `status` or `domain` → malformed, needs `/validate`.

5. Emit next-action hints for each blocked or stalled change.

No files are created or modified.

Args: `{{args}}`
"""
