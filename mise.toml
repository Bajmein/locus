# https://mise.jdx.dev

[vars]
project_name = "Locus"
project_slug = "locus"
github_username = "kenno"

[tools]
python = "3.14"
uv = "latest"
ruff = "latest"
dprint = "latest"

[env]
_.python.venv = { path = ".venv", create = true }
_.file = ".env"

# Dev tasks ==========================================

[tasks.default]
description = "Lista todas las tareas disponibles"
run = "mise tasks"

[tasks.install]
description = "Instala dependencias del proyecto"
run = "uv sync --all-groups"

[tasks.lint]
description = "Ejecuta linters (ruff, deptry, vulture)"
run = """
uv run ruff check src tests
uv run deptry src
uv run vulture src tests --min-confidence 80
"""

[tasks.format]
description = "Formatea el código"
run = """
uv run ruff format src tests
uv run dprint fmt
"""

[tasks.test]
description = "Ejecuta tests"
run = "uv run pytest"

[tasks.security]
description = "Análisis de seguridad"
run = "uv run bandit -r src -ll"

[tasks.typecheck]
description = "Verificación de tipos"
run = "uv run ty check src"

[tasks.check]
description = "Ejecuta todos los checks (lint + test + security + types)"
depends = ["lint", "test", "security", "typecheck"]

[tasks.list-dir]
description = "List status of changes in .engine/changes"
run = 'lsd --tree --all --group-directories-first -I "{__pycache__,.venv,.ruff_cache,.git,.idea,.pytest_cache,archive}" .engine/changes'
