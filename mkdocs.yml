site_name: Benjamín Criado — Desarrollo de Software & Automatización con IA
site_author: Benjamín Criado
site_description: Ingeniero Informático | Desarrollo de Software y Automatización con IA
theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Bajmein
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/benjamin-criado-rossa/

nav:
  - Home: index.md
  - Vigilia Reforged: vigilia/index.md
  - Vigilia Edge: vigilia-edge/index.md
  - Forge: forge/index.md
  - Laboratorio: laboratorio/index.md
  - CV: cv.md
