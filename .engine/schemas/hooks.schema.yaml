# Schema for .engine/hooks.yaml
# Declarative pre-phase hook configuration for Locus pipeline

$schema: "http://json-schema.org/draft-07/schema#"
title: HooksConfig
description: Declarative hooks that run before specific pipeline phases

type: object
required: []
additionalProperties: false
properties:
  hooks:
    type: array
    description: List of hook entries to execute before pipeline phases
    items:
      type: object
      required:
        - phase
        - type
        - label
      additionalProperties: false
      properties:
        phase:
          type: string
          description: "Pipeline phase to run before (e.g. pre-design, pre-apply, pre-specify)"
          pattern: "^pre-(propose|specify|design|break-to-tasks|apply|verify|explore)$"

        type:
          type: string
          description: Hook execution type
          enum:
            - cli
            - mcp

        label:
          type: string
          description: Human-readable label for this hook (shown in output)
          minLength: 1

        cmd:
          type: string
          description: "[CLI hooks only] Binary to execute. Must be in the allow-list."
          enum:
            - rg
            - ast-grep
            - eza
            - lsd
            - mise
            - just
            - ty
            - git

        args_list:
          type: array
          description: "[CLI hooks only] Positional arguments passed to cmd"
          items:
            type: string

        tool:
          type: string
          description: "[MCP hooks only] MCP tool name to invoke (e.g. mcp__serena__get_symbols_overview)"

        args:
          type: object
          description: "[MCP hooks only] Key-value arguments passed to the MCP tool"
          additionalProperties: true

        timeout_s:
          type: integer
          description: "Execution timeout in seconds (default: 30)"
          minimum: 1
          maximum: 300
          default: 30

      # Require cmd for cli hooks, tool for mcp hooks
      if:
        properties:
          type:
            const: cli
      then:
        required:
          - cmd
      else:
        required:
          - tool
